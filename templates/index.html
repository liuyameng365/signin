<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>扫码签到</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="card">
    <div class="hero">
      <div class="hero-panel">
        <h1>扫码签到</h1>
        <p>签到页按手机使用场景优化，扫码后可直接录入个人信息并完成签到。</p>
        <p class="hint">首次使用时，系统会引导填写姓名、身份证号和所属工区。</p>
      </div>
      <div>
        <img src="{{ url_for('qr_image', token=token) }}" alt="签到二维码" class="qr" />
      </div>
    </div>
    <p class="hint">（演示模式：扫码后将模拟微信身份获取）</p>
    <div class="actions">
      <a href="{{ url_for('admin_page') }}" class="btn">进入后台管理</a>
    </div>
  </div>
</body>
</html>
