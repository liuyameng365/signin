<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>填写个人信息</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="card compact">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="msg {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <h1>填写个人信息</h1>
    <p>首次签到前请完善资料，提交后会自动进入确认签到页面。</p>

    <form method="post" class="form-grid">
      <input type="hidden" name="openid" value="{{ form_data.openid }}" />

      <div class="field">
        <label for="name">姓名</label>
        <input id="name" name="name" type="text" placeholder="请输入真实姓名" value="{{ form_data.name }}" required />
      </div>

      <div class="field">
        <label for="id_card">身份证号</label>
        <input id="id_card" name="id_card" type="text" placeholder="请输入身份证号" value="{{ form_data.id_card }}" required />
      </div>

      <div class="field">
        <label for="work_area">所属工区</label>
        <input id="work_area" name="work_area" type="text" placeholder="如：一工区" value="{{ form_data.work_area }}" required />
      </div>

      <div class="actions">
        <button type="submit" class="btn primary">保存并继续签到</button>
      </div>
    </form>
  </div>
</body>
</html>
